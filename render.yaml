# Render Blueprint — https://dashboard.render.com/blueprints
# Neon: use Direct connection string (pooling OFF) for DATABASE_URL

services:
  - type: web
    name: erp-api
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build && npm run db:push:retry && if [ "$SEED_DB" = "true" ]; then npm run db:seed; fi
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: "*"
      - key: DATABASE_URL
        sync: false
      - key: SEED_DB
        value: "false"
