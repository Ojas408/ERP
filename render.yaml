# Render Blueprint — https://dashboard.render.com/blueprints
# Neon: set DATABASE_URL = Pooled connection, DIRECT_URL = Direct connection

services:
  - type: web
    name: erp-api
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: sh render-start.sh
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: "*"
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
